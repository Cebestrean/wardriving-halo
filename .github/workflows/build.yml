name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WardrivingHalo-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Copy APK to app folder
        run: cp app/build/outputs/apk/debug/app-debug.apk app/WardrivingHalo.apk

      - name: Commit updated APK
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "CI: update WardrivingHalo.apk"
          file_pattern: app/WardrivingHalo.apk
